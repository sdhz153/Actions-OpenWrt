# 脚本优化：修复远程.config下载逻辑+全步骤中文注释+多层缓存策略+插件冲突处理
name: openwrt-25.12-helloworld
# 工作流触发方式：支持手动/定时/仓库事件三种触发
on:
  repository_dispatch:          # 仓库API/外部事件触发（如其他脚本调用）
  schedule:                     # 定时触发，自动编译固件
    - cron: 0 21 * * *          # 每天UTC时间21点（北京时间次日5点）执行
  workflow_dispatch:            # 手动触发（GitHub页面点击Run workflow）
    inputs:
      ssh:                      # 手动触发可选参数：是否开启SSH远程调试
        description: 'SSH connection to Actions'
        required: false
        default: 'false'        # 默认关闭SSH调试

# 全局环境变量配置：整份脚本通用，统一管理便于修改
env:
  REPO_URL: https://github.com/openwrt/openwrt.git          # OpenWrt官方源码仓库地址
  REPO_BRANCH: openwrt-25.12                                 # 编译分支：25.12稳定版
  FEEDS_CONF: feeds.conf.default                             # OpenWrt Feeds配置文件名
  CONFIG_FILE: config/x86/25.12-helloworld.config    # 本地编译配置文件路径
  CONFIG_URL: https://raw.githubusercontent.com/sdhz153/Actions-OpenWrt/refs/heads/main/config/x86/25.12-helloworld.config  # 远程编译配置文件（本地无配置时自动下载）
  DIY_P1_SH: diy-part1.sh                                    # 前置自定义脚本（编译前执行，如修改源/添加插件）
  DIY_P2_SH: diy-part2.sh                                    # 后置自定义脚本（加载配置后执行，如修改编译参数）
  UPLOAD_BIN_DIR: false                                      # 是否上传编译原始二进制文件：关闭
  UPLOAD_FIRMWARE: true                                      # 是否上传最终固件文件：开启
  UPLOAD_COWTRANSFER: false                                  # 是否上传到奶牛快传：关闭
  UPLOAD_WETRANSFER: false                                   # 是否上传到WeTransfer：关闭
  UPLOAD_RELEASE: true                                       # 是否发布到GitHub Release：开启
  TZ: Asia/Shanghai                                          # 服务器时区：上海（解决时间显示错乱）
  CCACHE_SIZE: 10G                                           # ccache编译缓存大小：10G
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true                   # 强制Actions使用Node24（适配GitHub最新要求，避免报错）

# 编译核心任务：单任务串行执行，避免多任务资源冲突
jobs:
  build:
    runs-on: ubuntu-latest      # 编译服务器系统：Ubuntu最新版（OpenWrt推荐）
    # 并发控制：同一分支仅允许一个编译任务运行，重复触发则取消前一个
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # 步骤1：检出仓库本地代码
      - name: 检出仓库本地配置
        uses: actions/checkout@v4
        with:
          fetch-depth: 1        # 仅拉取最新版本，不拉取历史提交，节省时间和磁盘空间
      # 步骤2：打印步骤完成通知，便于日志排查
      - name: 通知-代码检出完成
        run: |
          echo "STEP: Checkout code completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤3：初始化编译环境，安装所有依赖工具链
      - name: 初始化编译环境（安装依赖+清理系统）
        env:
          DEBIAN_FRONTEND: noninteractive  # 关闭Debian交互提示，自动确认安装
        run: |
          # 删除系统无用大文件，释放磁盘空间（GitHub Actions默认磁盘空间有限）
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL	
          # 更新软件源，静默执行（-qq：无多余输出）
          sudo -E apt-get -qq update
          # 安装OpenWrt编译所需所有核心依赖：编译工具/库/语言环境/缓存工具等
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
            libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev
          # 卸载系统无用包，清理缓存，释放更多磁盘空间
          sudo -E apt-get -qq autoremove --purge || true
          sudo -E apt-get -qq clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # 配置服务器时区为上海
          sudo timedatectl set-timezone "${{ env.TZ }}" || true
          # 创建编译工作目录，赋予当前用户权限（避免编译权限报错）
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir || true
          # 打印系统信息，便于调试：核心数/剩余磁盘空间
          echo "🔧 系统核心数: $(nproc)"
          echo "🔧 剩余磁盘空间: $(df -h /workdir | awk 'NR==2{print $4}')"
          echo "STEP: Initialize build environment completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤4：克隆OpenWrt官方源码
      - name: 克隆OpenWrt官方源码
        working-directory: /workdir  # 执行目录：根工作目录
        run: |
          # 克隆源码，--depth=1：仅拉取最新版本，加速克隆
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          # 创建软链接，让后续脚本可在GitHub默认目录找到源码
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          cd openwrt
          # 打印OpenWrt版本信息（最新提交记录），便于确认源码版本
          echo "🔧 OpenWrt 版本: $(git log --oneline -1 | head -n1)"
          echo "STEP: Clone OpenWrt source code completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤5：缓存OpenWrt下载依赖包（dl目录），避免重复下载
      - name: 缓存-OpenWrt下载依赖包（dl目录）
        uses: actions/cache@v4
        id: cache-dl              # 步骤ID，后续可通过此ID判断缓存命中状态
        with:
          path: /workdir/openwrt/dl  # 缓存目录：依赖包下载目录
          # 缓存KEY：系统+分支+Feeds配置+编译配置，配置不变则缓存不变
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('openwrt/feeds.conf.default') }}-${{ hashFiles('openwrt/.config') }}
          # 缓存恢复规则：优先匹配完整KEY，匹配不到则匹配前缀
          restore-keys: |
            ${{ runner.os }}-${{ env.REPO_BRANCH }}-dl-
          enableCrossOsArchive: false  # 关闭跨系统缓存，避免兼容性问题
          fail-on-cache-miss: false    # 缓存未命中不终止编译，继续执行

      # 步骤6：加载自定义Feeds配置+执行前置DIY脚本
      - name: 加载自定义Feeds配置+执行前置DIY脚本
        run: |
          # 若本地有自定义Feeds配置，替换官方配置
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default || true
          # 给前置DIY脚本赋予执行权限
          chmod +x $DIY_P1_SH || true
          cd openwrt
          # 执行前置DIY脚本，执行失败不终止编译（|| true）
          $GITHUB_WORKSPACE/$DIY_P1_SH || true
          echo "STEP: Load custom feeds configuration completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤7：修改OpenWrt Feeds源为GitHub镜像（加速国内访问）
      - name: 修改OpenWrt Feeds源（替换为GitHub镜像）
        run: |
          cd openwrt
          # 将官方git.openwrt.org源替换为github.com/openwrt镜像，解决国内访问慢问题
          sed -i 's/git.openwrt.org\/feed/github.com\/openwrt/g' feeds.conf.default || true
          sed -i 's/git.openwrt.org\/project/github.com\/openwrt/g' feeds.conf.default || true
          echo "STEP: Update and modify OpenWrt feeds completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤8：克隆第三方插件（核心功能：homeproxy/mosdns等）
      - name: 克隆第三方插件（homeproxy/mosdns/geodata等）
        run: |
          cd openwrt
          # 克隆luci-app-mosdns（v5稳定分支，DNS解析/分流）
          git clone --depth=1 https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns || true
          # 克隆v2ray-geodata（IP库，用于代理分流/规则匹配）
          git clone --depth=1 https://github.com/sbwml/v2ray-geodata package/v2ray-geodata || true
          # 克隆homeproxy（代理核心插件，支持SS/SSR/V2Ray/Trojan）
          git clone --depth=1 https://github.com/fw876/helloworld.git -b master package/helloworld || true
          # 克隆自定义插件包（含brutal/vlmcsd等）
          git clone --depth=1 https://github.com/sdhz151/openwrt-app package/app || true
          echo "🔧 第三方包克隆完成"
          echo "STEP: Clone third-party packages completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤9：更新所有OpenWrt Feeds（官方+第三方）
      - name: 更新所有OpenWrt Feeds（官方+第三方）
        run: |
          cd openwrt
          # 更新所有Feeds源的软件包列表，-a：更新全部
          ./scripts/feeds update -a || true
          echo "🔧 更新已完成"
          echo "STEP: Update all OpenWrt feeds completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤11：处理插件软链接/目录结构（适配OpenWrt编译规则）
      - name: 处理插件软链接/目录结构（适配编译规则）
        id: process-softlink       # 步骤ID，后续可调用
        run: |
          cd openwrt
          # 移动brutal插件到根目录，便于OpenWrt编译系统识别
          mv package/app/brutal package/ || true
          # 移动vlmcsd插件到根目录，便于识别
          mv package/app/vlmcsd package/ || true
          # 移动luci-app-vlmcsd到LuCI应用目录，适配LuCI编译规则
          mv package/app/luci-app-vlmcsd feeds/luci/applications/ || true
          # 创建LuCI Feeds目录，避免目录不存在报错
          mkdir -p package/feeds/luci || true
          # 创建软链接，让编译系统能找到luci-app-vlmcsd
          ln -sf ../../../feeds/luci/applications/luci-app-vlmcsd package/feeds/luci/luci-app-vlmcsd || true
          echo "🔧 包软链接处理完成"
          # 删除无用的app目录，清理编译环境
          rm -rf package/helloworld/dnsproxy || true
          rm -rf package/helloworld/microsocks || true
          rm -rf package/helloworld/v2ray-core || true
          rm -rf package/helloworld/xray-core || true
          rm -rf package/helloworld/v2ray-geodata || true
          rm -rf package/helloworld/v2raya || true
          rm -rf package/helloworld/mosdns || true
          rm -rf tmp || true
          rm -rf package/app || true
          echo "🔧 重复包清理完成"
          echo "STEP: Process package soft links completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤11：安装所有OpenWrt Feeds软件包（官方+第三方）
      - name: 安装所有OpenWrt Feeds软件包
        run: |
          cd openwrt
          # 安装所有Feeds包，-a：全部安装，-f：!强制覆盖，解决依赖冲突
          ./scripts/feeds install -a || true
          # 打印安装的包数，便于确认安装结果
          echo "🔧 Feeds 安装完成，总包数: $(ls package/feeds/ | wc -l)"
          echo "STEP: Install all OpenWrt feeds completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤14：加载编译配置（核心修复：本地无.config时自动下载远程配置，解决原逻辑错误）
      - name: 加载编译配置
        run: |
          # 若本地有自定义files目录（固件默认配置/文件），复制到源码目录
          [ -e files ] && mv files openwrt/files/ || true
          cd openwrt
          # 核心修复：本地无.config时，自动下载远程CONFIG_URL并加载（原逻辑目录创建错误，已修正）
          if [ ! -f "${{ env.CONFIG_FILE }}" ]; then
            # 本地无配置文件，检查远程CONFIG_URL是否有效
            if [ -n "${{ env.CONFIG_URL }}" ]; then
              # 下载远程配置文件到源码根目录，命名为.config（直接覆盖，无需创建多余目录）
              wget -q -O ./.config "${{ env.CONFIG_URL }}"
              # 校验下载结果：文件非空则加载成功，否则提示失败
              if [ -s ./.config ]; then
                echo "✅ 本地无配置，远程.config文件下载并加载成功"
              else
                echo "❌ 远程.config文件下载失败/文件为空，编译将使用默认配置"
                rm -f ./.config  # 删除空文件，避免编译报错
              fi
            fi
          else
            # 本地有配置文件，直接复制到源码根目录
            mv ${{ env.CONFIG_FILE }} ./.config
            echo "✅ 本地.config文件加载完成"
          fi

      # 步骤6：加载自定义Feeds配置+执行前置DIY2脚本
      - name: 执行前置DIY2脚本+应用补丁
        run: |
          # 给前置DIY脚本赋予执行权限
          chmod +x $DIY_P2_SH || true
          cd openwrt
          # 执行前置DIY脚本，执行失败不终止编译（|| true）
          $GITHUB_WORKSPACE/$DIY_P2_SH || true
          # 应用自定义补丁：BBR3拥塞控制（提升网络性能）
          git apply --quiet $GITHUB_WORKSPACE/patches/bbr3.patch || true
          git apply --quiet $GITHUB_WORKSPACE/patches/BBRv3-diag-information.patch || true
          # 应用Rust更新补丁（解决Rust语言插件编译问题）
          git apply --quiet $GITHUB_WORKSPACE/patches/llvm-download-ci-llvm-set-to-false.patch || true
          # 强制开启ccache编译缓存，写入.config配置
          echo "CONFIG_CCACHE=y" >> .config || true
          echo "CONFIG_CCACHE_SIZE=${{ env.CCACHE_SIZE }}" >> .config || true
          echo "CONFIG_CCACHE_DIR=/workdir/.ccache" >> .config || true
          # 生成默认配置，补全.config中缺失的参数，避免编译报错
          make defconfig >/dev/null 2>&1 || true
          echo "🔧 固件配置加载&补丁应用完成"
          echo "STEP: Load custom firmware configuration completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤15：预下载所有编译依赖包（加速编译，避免边编译边下载）
      - name: 预下载所有编译依赖包
        run: |
          cd openwrt
          # 多线程下载依赖包，-j$(nproc)：使用服务器所有核心，加速下载
          make download -j$(nproc) >/dev/null 2>&1 || true
          # 删除空文件/损坏的下载文件，避免编译时因文件问题报错
          find dl -size -1k -exec rm -f {} \; || true
          # 打印下载的文件数，便于确认下载结果
          echo "🔧 依赖包下载完成，共下载: $(ls dl/ | wc -l) 个文件"
          echo "STEP: Download dependent packages completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤16：配置ccache编译缓存环境（设置环境变量+创建目录）
      - name: 配置ccache编译缓存环境（设置环境变量）
        run: |
          # 配置ccache环境变量：缓存目录/大小/压缩策略
          echo "CCACHE_DIR=/workdir/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=${{ env.CCACHE_SIZE }}" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV  # 开启缓存压缩，节省磁盘空间
          echo "CCACHE_COMPRESSLEVEL=6" >> $GITHUB_ENV  # 压缩级别：6（平衡压缩比和速度）
          # 将ccache加入PATH，让编译系统优先使用ccache包装的编译器
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          # 创建ccache缓存目录，赋予执行权限
          mkdir -p /workdir/.ccache
          chmod 755 /workdir/.ccache
          # 打印配置文件哈希值，便于确认配置是否变更
          echo "📄 feeds.conf.default 哈希: $(sha256sum openwrt/feeds.conf.default 2>/dev/null | cut -d' ' -f1 || echo 'N/A')"
          echo "📄 .config 哈希: $(sha256sum openwrt/.config 2>/dev/null | cut -d' ' -f1 || echo 'N/A')"
          echo "STEP: Setup ccache compile environment completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤17：缓存ccache编译文件（专用Action，稳定保存/恢复）
      - name: 缓存-ccache编译文件（专用Action）
        uses: hendrikmuhs/ccache-action@v1.2  # 编译专用ccache缓存Action，比原生cache更稳定
        id: cache-ccache
        with:
          # 缓存KEY：系统+分支+分支名+Feeds配置+编译配置，精准匹配
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-ccache-${{ github.ref_name }}-${{ hashFiles('openwrt/feeds.conf.default','openwrt/.config') }}
          # 缓存恢复规则：优先精准匹配，再匹配分支名，最后匹配基础分支
          restore-keys: |
            ${{ runner.os }}-${{ env.REPO_BRANCH }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-${{ env.REPO_BRANCH }}-ccache-
          max-size: ${{ env.CCACHE_SIZE }}  # 缓存最大大小，与全局配置一致

      # 步骤19：缓存编译环境目录（staging_dir），加速后续编译
      - name: 缓存-编译环境目录（staging_dir）
        uses: actions/cache@v4
        id: cache-staging
        with:
          path: /workdir/openwrt/staging_dir  # 缓存目录：编译环境/工具链目录
          # 缓存KEY：系统+分支+Feeds配置+编译配置
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-staging-${{ hashFiles('openwrt/feeds.conf.default','openwrt/.config') }}
          # 缓存恢复规则：优先精准匹配，再匹配基础分支
          restore-keys: |
            ${{ runner.os }}-${{ env.REPO_BRANCH }}-staging-
          enableCrossOsArchive: false  # 关闭跨系统缓存，避免兼容性问题

      # 步骤20：检查所有缓存命中状态（打印日志，便于调试）
      - name: 检查-所有缓存命中状态
        run: |
          echo "==================== 缓存命中状态 ===================="
          echo "📦 下载包缓存: ${{ steps.cache-dl.outputs.cache-hit }}"
          echo "📦 编译缓存ccache: ${{ steps.cache-ccache.outputs.cache-hit }}"
          echo "📦 staging_dir 缓存: ${{ steps.cache-staging.outputs.cache-hit }}"
          echo "======================================================"
          # 若ccache已安装，打印初始统计信息（缓存大小/命中率等）
          if [ -x "$(which ccache)" ]; then
            echo "📊 ccache 初始统计信息:"
            ccache -s
          fi
          echo "STEP: Check cache hit status completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤21：编译OpenWrt固件（核心步骤，失败则单线程重新编译）
      - name: 编译OpenWrt固件（多线程编译，失败自动单线程查错）
        run: |
          cd openwrt
          # 设置编译参数：多线程+开启ccache+详细日志
          export MAKEFLAGS="-j$(nproc) CCACHE=1"
          # 打印编译信息，便于日志排查
          echo "🚀 开始编译，使用 $(nproc) 线程"
          echo "🚀 编译时间: $(date +%Y-%m-%d\ %H:%M:%S)"
          # 多线程编译，失败则单线程编译（单线程报错信息更清晰，便于查错）
          make || make -j1 || make -j1 V=s
          # 提取固件设备名称（从.config中获取），用于后续固件命名
          DEVICE_NAME=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' || echo "x86_64")
          # 将设备名称/编译日期写入环境变量，后续步骤复用
          echo "DEVICE_NAME=${DEVICE_NAME}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "✅ 固件编译完成"
          echo "STEP: Compile OpenWrt firmware completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤22：打印ccache最终统计信息（无论编译成功/失败，都打印）
      - name: 打印-ccache最终统计信息（编译后）
        if: always()  # 始终执行，即使前面步骤失败
        run: |
          echo "==================== 最终缓存统计 ===================="
          # 打印ccache统计信息：命中率/缓存大小/实际使用空间等
          if [ -x "$(which ccache)" ]; then
            ccache -s
            echo "📦 缓存目录: $CCACHE_DIR"
            echo "📦 缓存实际大小: $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1 || echo 'N/A')"
          fi
          # 打印编译目录大小/剩余磁盘空间/编译状态，便于调试
          echo "📦 剩余磁盘空间: $(df -h /workdir | awk 'NR==2{print $4}')"
          echo "📦 固件编译状态: ${{ job.status }}"
          echo "======================================================"
          echo "STEP: Print final ccache statistics completed — $(date +%Y-%m-%d\ %H:%M:%S)"

      # 步骤23：上传固件到GitHub Artifact（临时存储，便于下载）
      - name: 上传固件-GitHub Artifact
        uses: actions/upload-artifact@v4
        if: job.status == 'success'  # 仅编译成功时执行
        with:
          # 固件包名称：OpenWrt_设备名_规则_编译日期
          name: OpenWrt_${{ env.DEVICE_NAME }}_nftables_${{ env.BUILD_DATE }}
          path: /workdir/openwrt/bin/targets/  # 固件输出目录
          retention-days: 2  # 固件保留天数：2天（自动清理）
          if-no-files-found: error  # 无固件文件则报错，终止步骤

      # 步骤24：发布固件到GitHub Release（长期存储，便于分享/下载）
      - name: 发布固件-GitHub Release
        uses: softprops/action-gh-release@v2
        if: env.UPLOAD_RELEASE == 'true' && job.status == 'success'  # 开启发布且编译成功时执行
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}  # GitHub自动生成的仓库令牌，用于授权发布
        with:
          files: /workdir/openwrt/bin/targets/**/*  # 发布所有固件文件
          tag_name: ${{ env.REPO_BRANCH }}-${{ env.DEVICE_NAME }}-${{ env.BUILD_DATE }}  # Release标签（唯一）
          name: ${{ env.REPO_BRANCH }}-${{ env.DEVICE_NAME }}-helloworld-${{ env.BUILD_DATE }}  # Release名称
          # Release描述信息，自动生成
          body: |
            ## 📦 OpenWrt 固件编译结果
            - 架构: ${{ env.DEVICE_NAME }} (x86_64)
            - 内核规则: nftables
            - 核心插件: helloworld/mosdns/vlmcsd
            - 编译线程: $(nproc)
            - 编译时间: ${{ env.BUILD_DATE }}
            - 缓存配置: ccache ${CCACHE_SIZE} + build_dir + staging_dir 三层缓存
            - 内核优化: BBR3 拥塞控制算法
            - 语言环境: 最新Golang（适配Go语言插件）
            - 补丁支持: BBR3优化/Rust更新
          draft: false  # 不创建草稿，直接发布
          prerelease: false  # 不标记为预发布版本
          fail_on_unmatched_files: false  # 无匹配文件不报错，继续执行
